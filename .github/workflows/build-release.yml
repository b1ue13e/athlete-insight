name: Build Release APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如: 1.0.0)'
        required: true
        default: '1.0.0'
      release_notes:
        description: '发布说明'
        required: false
        default: ''

jobs:
  build-release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci --legacy-peer-deps
      
    - name: Update version
      run: |
        # 更新 capacitor.config.ts 中的版本
        sed -i "s/appVersion: '1.0.0'/appVersion: '${{ github.event.inputs.version }}'/" capacitor.config.ts
        
    - name: Build Next.js static export
      run: npm run build
      
    - name: Setup JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Make gradlew executable
      run: chmod +x ./android/gradlew
      
    - name: Build Release APK
      run: |
        cd android
        ./gradlew assembleRelease
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        
    - name: Sign APK (if keystore exists)
      if: secrets.KEYSTORE_BASE64 != ''
      run: |
        echo ${{ secrets.KEYSTORE_BASE64 }} | base64 -d > android/app/keystore.jks
        cd android
        $ANDROID_SDK_ROOT/build-tools/33.0.0/apksigner sign \
          --ks app/keystore.jks \
          --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
          --key-pass pass:${{ secrets.KEY_PASSWORD }} \
          --out app/build/outputs/apk/release/app-release-signed.apk \
          app/build/outputs/apk/release/app-release-unsigned.apk
          
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release-${{ github.event.inputs.version }}
        path: |
          android/app/build/outputs/apk/release/*.apk
          
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: android/app/build/outputs/apk/release/*.apk
        tag_name: v${{ github.event.inputs.version }}
        name: v${{ github.event.inputs.version }} - ${{ github.event.inputs.release_notes || 'Release Build' }}
        body: |
          ## Athlete Insight v${{ github.event.inputs.version }}
          
          ${{ github.event.inputs.release_notes }}
          
          ### 安装说明
          1. 下载 `app-release-*.apk`
          2. 在 Android 设备上允许"安装未知来源应用"
          3. 点击安装
          
          ### 功能特性
          - 📱 离线优先：所有数据本地存储
          - ⚡ 快速录入：场边 3 分钟完成评估
          - 📊 智能分析：自动对比个人基线
          - 💾 草稿自动保存：永不丢失录入进度
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
